<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List and Table Example</title>
</head>
<body>
    <h2>Unordered List</h2>
    <ul>
        <li>Apple</li>
        <li>Orange</li>
        <li>Banana</li>
    </ul>
    <h2>Ordered List</h2>
    <ol>
        <li>Step One</li>
        <li>Step Two</li>
        <li>Step Three</li>
    </ol>
    <h2>Sample Table</h2>
    <table border="1">
        <tr>
            <th>Name</th>
            <th>City</th>
        </tr>
        <tr>
            <td>Ravi</td>
            <td>Delhi</td>
        </tr>
        <tr>
            <td>Anita</td>
            <td>Mumbai</td>
        </tr>
    </table>
</body>
</html>
